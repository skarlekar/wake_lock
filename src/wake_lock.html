<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen Wake Lock Demo</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: #f5f5f5;
    }

    .card {
      width: min(680px, 92vw);
      padding: 24px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    h1 {
      margin-top: 0;
      font-size: 1.8rem;
    }

    p {
      line-height: 1.5;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 1rem;
      cursor: pointer;
    }

    #startBtn { background: #3b82f6; color: white; }
    #releaseBtn { background: #374151; color: white; }

    .status {
      padding: 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      font-family: monospace;
      white-space: pre-wrap;
    }

    .render-box {
      margin-top: 20px;
      height: 180px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }

    .dot {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 18px rgba(34, 197, 94, 0.75);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Continuous Render + Keep Screen Awake</h1>
    <p>
      Click <strong>Enable Wake Lock</strong> after the page loads. This requests a screen wake lock
      while the page is visible, which helps prevent the display from sleeping during continuous rendering.
    </p>

    <div class="controls">
      <button id="startBtn">Enable Wake Lock</button>
      <button id="releaseBtn">Release Wake Lock</button>
    </div>

    <div id="status" class="status">Status: idle</div>

    <div class="render-box" id="renderBox">
      <div class="dot" id="dot"></div>
    </div>
  </main>

  <script>
    let wakeLock = null;
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const releaseBtn = document.getElementById('releaseBtn');

    function setStatus(message) {
      statusEl.textContent = `Status: ${message}`;
    }

    async function keepScreenAwake() {
      if (!('wakeLock' in navigator)) {
        setStatus('Wake Lock API is not supported in this browser.');
        return;
      }

      try {
        wakeLock = await navigator.wakeLock.request('screen');
        setStatus('Wake lock is active.');

        wakeLock.addEventListener('release', () => {
          setStatus('Wake lock was released.');
          wakeLock = null;
        });
      } catch (err) {
        setStatus(`Failed to acquire wake lock: ${err.name} - ${err.message}`);
      }
    }

    async function releaseWakeLock() {
      if (wakeLock) {
        await wakeLock.release();
        wakeLock = null;
        setStatus('Wake lock released by user.');
      }
    }

    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'visible' && !wakeLock) {
        await keepScreenAwake();
      }
    });

    startBtn.addEventListener('click', keepScreenAwake);
    releaseBtn.addEventListener('click', releaseWakeLock);

    // Simple continuous render demo
    const dot = document.getElementById('dot');
    const box = document.getElementById('renderBox');
    let start = performance.now();

    function render(now) {
      const t = (now - start) / 1000;
      const width = box.clientWidth - 22;
      const height = box.clientHeight - 22;

      const x = (Math.sin(t * 1.7) * 0.5 + 0.5) * width;
      const y = (Math.cos(t * 1.3) * 0.5 + 0.5) * height;

      dot.style.transform = `translate(${x}px, ${y}px)`;
      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  </script>
</body>
</html>
